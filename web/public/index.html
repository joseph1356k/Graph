<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=/provider-studio.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miracle</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <style>
        :root {
            --bg: #f4f1eb;
            --surface: rgba(255, 255, 255, 0.82);
            --line: rgba(32, 28, 24, 0.08);
            --ink: #191614;
            --muted: #70665d;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Instrument Sans", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 14% 10%, rgba(255, 255, 255, 0.72), transparent 28%),
                radial-gradient(circle at 88% 14%, rgba(207, 219, 228, 0.62), transparent 28%),
                linear-gradient(160deg, #f8f4ee 0%, var(--bg) 46%, #ece7de 100%);
        }

        .redirect-card {
            width: min(540px, 100%);
            padding: 32px;
            border-radius: 28px;
            border: 1px solid var(--line);
            background: var(--surface);
            backdrop-filter: blur(18px);
            text-align: center;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 7vw, 3rem);
            line-height: 1;
            letter-spacing: -0.05em;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        a {
            color: inherit;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="redirect-card">
        <h1>Miracle</h1>
        <p>Redirigiendo al Provider Studio. Si no ocurre automáticamente, abre <a href="/provider-studio.html">el dashboard principal</a>.</p>
    </main>
</body>
</html>
